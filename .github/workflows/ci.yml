name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit de dependências
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Testes unitários
        run: pnpm test

      - name: Build de produção
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || 'placeholder-vapid-key' }}

  migrate:
    runs-on: ubuntu-latest
    # Roda apenas em PRs para a main, após o CI passar.
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Pré-requisito: configure os 3 secrets no GitHub → Settings → Secrets → Actions:
      #   SUPABASE_ACCESS_TOKEN  → token pessoal (supabase.com/dashboard/account/tokens)
      #   SUPABASE_DB_PASSWORD   → senha do banco de staging
      #   SUPABASE_PROJECT_REF   → ref do projeto de staging (ex.: abcdefghijklmnop)
      - name: Aplicar migrations no staging
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        run: |
          supabase db push \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
